<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP × BlueSnap — Sales Mastery Course v2</title>
<style>
:root {
  --bg: #0a0e17;
  --surface: #111827;
  --surface2: #1a2236;
  --surface3: #232d42;
  --border: #2a3550;
  --text: #e2e8f0;
  --text-dim: #8896b0;
  --accent: #3b82f6;
  --accent-glow: #60a5fa;
  --green: #34d399;
  --green-dim: #065f46;
  --orange: #f59e0b;
  --orange-dim: #78350f;
  --red: #ef4444;
  --red-dim: #7f1d1d;
  --purple: #a78bfa;
  --cyan: #22d3ee;
  --sap-blue: #0070f2;
  --bs-blue: #3b82f6;
  --nav-w: 260px;
  --radius: 8px;
  --transition: 0.25s ease;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.65;
  overflow-x: hidden; min-height: 100vh;
}
/* ─── NAV ─── */
nav {
  position: fixed; left: 0; top: 0; bottom: 0; width: var(--nav-w);
  background: var(--surface); border-right: 1px solid var(--border);
  overflow-y: auto; z-index: 100; display: flex; flex-direction: column;
  transition: transform var(--transition);
}
nav .logo { padding: 24px 20px 16px; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-glow); border-bottom: 1px solid var(--border); }
nav .logo span { color: var(--text-dim); font-weight: 400; }
nav .logo .ver { display: block; font-size: 10px; color: var(--text-dim); letter-spacing: 1px; margin-top: 4px; font-weight: 400; }
nav ul { list-style: none; padding: 8px 0; flex: 1; }
nav li a { display: flex; align-items: center; gap: 10px; padding: 10px 20px; font-size: 13.5px; color: var(--text-dim); text-decoration: none; transition: all var(--transition); border-left: 3px solid transparent; }
nav li a:hover { color: var(--text); background: var(--surface2); }
nav li a.active { color: var(--accent-glow); background: rgba(59,130,246,.08); border-left-color: var(--accent); }
nav li a .num { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--surface3); font-size: 11px; font-weight: 600; color: var(--text-dim); flex-shrink: 0; }
nav li a.active .num { background: var(--accent); color: #fff; }
nav .progress-bar { padding: 16px 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-dim); }
nav .progress-bar .bar { height: 4px; background: var(--surface3); border-radius: 2px; margin-top: 8px; overflow: hidden; }
nav .progress-bar .bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; width: 0%; }
/* ─── MAIN ─── */
main { margin-left: var(--nav-w); min-height: 100vh; }
.section { display: none; padding: 48px 56px 80px; max-width: 960px; animation: fadeUp 0.35s ease; }
.section.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px; }
h2 { font-size: 22px; font-weight: 700; margin: 32px 0 12px; letter-spacing: -0.3px; }
h3 { font-size: 17px; font-weight: 600; margin: 24px 0 8px; color: var(--accent-glow); }
.subtitle { color: var(--text-dim); font-size: 15px; margin-bottom: 32px; }
p { margin-bottom: 14px; font-size: 14.5px; }
/* ─── CARDS ─── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; transition: border-color var(--transition); }
.card:hover { border-color: var(--accent); }
.card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 16px 0; }
.card-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
.card-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.card-body { font-size: 13.5px; color: var(--text-dim); }
.card-body p { color: var(--text-dim); }
/* ─── REALITY BOX ─── */
.reality-box { background: rgba(167,139,250,.06); border: 1px solid rgba(167,139,250,.2); border-radius: 8px; padding: 18px 20px; margin: 20px 0; }
.reality-box .rb-header { display: flex; gap: 12px; margin-bottom: 10px; }
.reality-box .rb-col { flex: 1; }
.reality-box .rb-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
.reality-box .rb-label.sap { color: var(--sap-blue); }
.reality-box .rb-label.real { color: var(--purple); }
.reality-box .rb-text { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
/* ─── DIAGRAM ─── */
.diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; margin: 24px 0; position: relative; overflow: hidden; }
.diagram-container svg { width: 100%; height: auto; display: block; }
.diagram-node { cursor: pointer; transition: all 0.3s ease; }
.diagram-node:hover { filter: brightness(1.3); }
/* ─── TOOLTIP ─── */
.tooltip-term { border-bottom: 1px dashed var(--accent); cursor: help; position: relative; color: var(--accent-glow); }
.tooltip-term:hover::after { content: attr(data-def); position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%); background: var(--surface3); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; font-size: 12.5px; color: var(--text); width: 300px; z-index: 50; line-height: 1.5; white-space: normal; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
/* ─── BUTTONS ─── */
.reveal-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); color: var(--accent-glow); padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all var(--transition); font-family: inherit; }
.reveal-btn:hover { background: var(--surface3); border-color: var(--accent); }
.reveal-content { display: none; margin-top: 12px; padding: 16px; background: var(--surface2); border-radius: 6px; border-left: 3px solid var(--accent); }
.reveal-content.show { display: block; animation: fadeUp 0.25s ease; }
/* ─── TOGGLE ─── */
.toggle-group { display: flex; gap: 0; margin: 16px 0; }
.toggle-btn { padding: 10px 20px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); font-family: inherit; transition: all var(--transition); }
.toggle-btn:first-child { border-radius: 6px 0 0 6px; }
.toggle-btn:last-child { border-radius: 0 6px 6px 0; }
.toggle-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.toggle-panel { display: none; }
.toggle-panel.active { display: block; animation: fadeUp 0.2s ease; }
/* ─── QUIZ ─── */
.quiz-q { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.quiz-option { display: block; width: 100%; text-align: left; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 6px; font-size: 13.5px; cursor: pointer; margin-bottom: 8px; font-family: inherit; transition: all var(--transition); }
.quiz-option:hover { border-color: var(--accent); background: var(--surface3); }
.quiz-option.correct { border-color: var(--green); background: var(--green-dim); }
.quiz-option.wrong { border-color: var(--red); background: var(--red-dim); }
.quiz-option.disabled { pointer-events: none; opacity: 0.7; }
.quiz-feedback { margin-top: 12px; padding: 14px; border-radius: 6px; font-size: 13px; line-height: 1.6; display: none; }
.quiz-feedback.show { display: block; animation: fadeUp 0.2s ease; }
.quiz-feedback.good { background: var(--green-dim); border-left: 3px solid var(--green); }
.quiz-feedback.bad { background: var(--red-dim); border-left: 3px solid var(--red); }
/* ─── FLOW STEPS ─── */
.flow-steps { display: flex; flex-direction: column; gap: 2px; margin: 16px 0; }
.flow-step { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--surface2); border-left: 3px solid var(--border); cursor: pointer; transition: all var(--transition); font-size: 13.5px; }
.flow-step:first-child { border-radius: 6px 6px 0 0; }
.flow-step:last-child { border-radius: 0 0 6px 6px; }
.flow-step .step-num { width: 28px; height: 28px; border-radius: 50%; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; color: var(--text-dim); }
.flow-step.active { border-left-color: var(--accent); background: var(--surface3); }
.flow-step.active .step-num { background: var(--accent); color: #fff; }
.flow-step .step-detail { display: none; margin-top: 8px; font-size: 12.5px; color: var(--text-dim); line-height: 1.6; }
.flow-step.active .step-detail { display: block; }
/* ─── DECISION TREE ─── */
.dt-question { font-size: 16px; font-weight: 600; margin-bottom: 16px; text-align: center; }
.dt-options { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
.dt-opt { padding: 14px 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit; color: var(--text); transition: all var(--transition); min-width: 160px; text-align: center; }
.dt-opt:hover { border-color: var(--accent); background: var(--surface3); }
.dt-opt.selected { border-color: var(--accent); background: rgba(59,130,246,.15); color: var(--accent-glow); }
.dt-result { margin-top: 16px; padding: 20px; background: var(--surface2); border-radius: 8px; border-left: 3px solid var(--green); display: none; animation: fadeUp 0.25s ease; }
.dt-result.show { display: block; }
/* ─── COMP TABLE ─── */
.comp-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px; }
.comp-table th { text-align: left; padding: 12px 14px; background: var(--surface2); border-bottom: 2px solid var(--border); font-weight: 600; }
.comp-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text-dim); }
.comp-table tr:hover td { background: var(--surface2); }
.check { color: var(--green); font-weight: 700; }
.cross { color: var(--red); font-weight: 700; }
.partial { color: var(--orange); font-weight: 700; }
/* ─── CHEAT ─── */
.cheat-item { padding: 16px; margin-bottom: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; }
.cheat-label { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--green); margin-bottom: 6px; }
.cheat-text { font-size: 14px; font-style: italic; }
.cheat-why { font-size: 12.5px; color: var(--text-dim); margin-top: 6px; }
/* ─── SIM ─── */
.sim-persona { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
.sim-persona-btn { flex: 1; min-width: 140px; padding: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; text-align: center; transition: all var(--transition); font-family: inherit; color: var(--text); }
.sim-persona-btn:hover { border-color: var(--accent); }
.sim-persona-btn.selected { border-color: var(--accent); background: rgba(59,130,246,.1); }
.sim-persona-btn .icon { font-size: 28px; margin-bottom: 8px; }
.sim-persona-btn .label { font-size: 14px; font-weight: 600; }
.sim-persona-btn .desc { font-size: 11.5px; color: var(--text-dim); margin-top: 4px; }
/* ─── CHECKLIST ─── */
.checklist-item { display: flex; gap: 12px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; cursor: pointer; transition: all var(--transition); align-items: flex-start; }
.checklist-item:hover { border-color: var(--accent); }
.checklist-check { width: 20px; height: 20px; border-radius: 4px; border: 2px solid var(--border); flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all var(--transition); font-size: 12px; }
.checklist-item.checked .checklist-check { background: var(--accent); border-color: var(--accent); }
.checklist-item .cq { font-size: 14px; font-weight: 500; }
.checklist-item .cwhy { font-size: 12.5px; color: var(--text-dim); margin-top: 4px; display: none; line-height: 1.6; }
.checklist-item.checked .cwhy { display: block; }
/* ─── INSIGHT ─── */
.insight { background: rgba(59,130,246,.06); border: 1px solid rgba(59,130,246,.2); border-radius: 8px; padding: 18px 20px; margin: 20px 0; }
.insight-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
.insight p { margin: 0; font-size: 13.5px; }
/* ─── BADGE ─── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
.badge-blue { background: rgba(59,130,246,.15); color: var(--accent-glow); }
.badge-green { background: rgba(52,211,153,.15); color: var(--green); }
.badge-orange { background: rgba(245,158,11,.15); color: var(--orange); }
.badge-red { background: rgba(239,68,68,.15); color: var(--red); }
.badge-purple { background: rgba(167,139,250,.15); color: var(--purple); }
/* ─── NAV FOOTER ─── */
.nav-footer { display: flex; justify-content: space-between; padding-top: 32px; margin-top: 48px; border-top: 1px solid var(--border); }
.nav-arrow { padding: 10px 20px; border-radius: 6px; font-size: 13px; font-family: inherit; cursor: pointer; transition: all var(--transition); border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); }
.nav-arrow:hover { border-color: var(--accent); color: var(--text); }
.nav-arrow.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.nav-arrow.primary:hover { background: var(--accent-glow); }
/* ─── MOBILE ─── */
.menu-toggle { display: none; position: fixed; top: 12px; left: 12px; z-index: 200; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 18px; cursor: pointer; font-family: inherit; }
@media (max-width: 800px) {
  nav { transform: translateX(-100%); }
  nav.open { transform: translateX(0); }
  .menu-toggle { display: block; }
  main { margin-left: 0; }
  .section { padding: 48px 20px 80px; }
  .card-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<!-- ═══════════ 2. FOUNDATIONS ═══════════ -->
<div class="section" id="sec-foundations">
<h1>SAP Payments Foundations</h1>
<p class="subtitle">Core terms, ERP landscape, and the critical distinction between incoming and outgoing payment flows.</p>

<h2>The SAP ERP Landscape</h2>
<p>SAP doesn't have one ERP — they have several, and the distinctions matter for how you sell.</p>

<div class="card-grid">
  <div class="card">
    <div class="card-label">Strategic Flagship</div>
    <div class="card-title">SAP Cloud ERP (Public Cloud)</div>
    <div class="card-body">SaaS offering. Competes with Workday, NetSuite. DPA is the <strong>mandatory native integration</strong> for credit card processing — no custom ABAP, clean core enforced. External checkouts can still process payments outside SAP but require DPA's Preparation step for reconciliation.</div>
  </div>
  <div class="card">
    <div class="card-label">On-Premise</div>
    <div class="card-title">S/4HANA (On-Prem)</div>
    <div class="card-body">Customer owns the system. Can import custom PSP code or use the legacy CA-PCI interface. DPA is optional but recommended for clean core alignment. Popular in Asia and with enterprises that want full control.</div>
  </div>
  <div class="card">
    <div class="card-label">PCI Gray Zone</div>
    <div class="card-title">S/4HANA Private Cloud</div>
    <div class="card-body">Same code line as on-prem, hosted by SAP. <strong>S/4HANA is not designed to store or process raw card data.</strong> Without DPA, SAP cannot provide PCI attestation for card flows. SAP strongly recommends DPA here — their internal sales guidance: "make DPA the default unless the customer's PCI assessor confirms otherwise."</div>
  </div>
  <div class="card">
    <div class="card-label">Legacy — End of Life 2030</div>
    <div class="card-title">SAP ECC (Classic ERP)</div>
    <div class="card-body">Built in the 90s. Maintenance ends 2027 (extended to 2030). Uses the old CA-PCI interface — not DPA. Every ECC customer must migrate. Massive opportunity to position BlueSnap early in transformation planning.</div>
  </div>
</div>

<h2>DPA vs. BCM/PMW: Two Different Payment Worlds <span class="badge badge-purple">New</span></h2>
<p>Finance and Treasury stakeholders live in both worlds. Knowing the difference prevents embarrassing mix-ups.</p>

<div class="card-grid">
  <div class="card" style="border-top: 3px solid var(--accent);">
    <div class="card-label" style="color: var(--accent);">DPA — Incoming Digital Payments</div>
    <div class="card-body">
      <p>Handles: Credit cards, wallets, alternative payments</p>
      <p>Flow: Customer pays you → auth → capture → reconciliation in FICO</p>
      <p>Where BlueSnap lives: PSP adapter processes the card transaction</p>
      <p style="margin-top: 6px;"><strong>This is the DPA story — Accounts Receivable, card-based.</strong></p>
    </div>
  </div>
  <div class="card" style="border-top: 3px solid var(--cyan);">
    <div class="card-label" style="color: var(--cyan);">BCM / PMW — Outgoing Payments</div>
    <div class="card-body">
      <p>Handles: SEPA, ACH, wire transfers, real-time payments</p>
      <p>Flow: You pay vendors → payment run → bank file → transmission</p>
      <p>Tools: Bank Communication Management, Payment Medium Workbench</p>
      <p style="margin-top: 6px;"><strong>This is Accounts Payable / Treasury. DPA does not replace this.</strong></p>
    </div>
  </div>
</div>
<p style="font-size: 13px; color: var(--text-dim);">If a Finance stakeholder asks about outgoing payments (vendor payments, payroll, treasury), that's BCM/PMW territory — not DPA. Acknowledge it, then steer back to the incoming card payments and AR automation where BlueSnap adds value.</p>

<h2>Key Terms <span class="badge badge-blue">Interactive Glossary</span></h2>
<div class="card" style="column-count: 2; column-gap: 24px;">
  <p><span class="tooltip-term" data-def="Financial Accounting and Controlling — SAP's core financial module. Handles general ledger, AP, AR, asset accounting, and cost center management. DPA's reconciliation flows post directly into FICO.">FICO</span> — SAP's core finance module</p>
  <p><span class="tooltip-term" data-def="A legal entity within SAP. Each company code has its own books, balance sheet, and P&L. A single SAP instance can have hundreds of company codes (subsidiaries). Payment processing must be configured per company code.">Company Code</span> — Legal entity within SAP</p>
  <p><span class="tooltip-term" data-def="The process of matching incoming bank payments against open invoices in SAP. DPA automates this by fetching settlement advice from the PSP and clearing open items in FICO — often replacing manual teams.">Cash Application</span> — Matching payments to invoices</p>
  <p><span class="tooltip-term" data-def="Payment Card Industry Data Security Standard. PCI compliance is scope-based, not binary. DPA reduces PCI scope by ensuring raw card data never enters the ERP — only tokens. SAP can provide PCI attestation for the DPA layer.">PCI DSS</span> — Card data security standard</p>
  <p><span class="tooltip-term" data-def="Replacing sensitive card data with a non-sensitive placeholder. DPA uses double tokenization: PSP token → DP Token. Only the DP Token is stored in S/4HANA, keeping the ERP out of PCI scope in standard flows.">Tokenization</span> — Replacing card data with tokens</p>
  <p><span class="tooltip-term" data-def="SAP's strategy requiring customers to minimize custom code modifications. Cloud ERP enforces this by default. DPA is the clean core-compliant way to handle payments — custom ABAP integrations violate it.">Clean Core</span> — No custom code modifications</p>
  <p><span class="tooltip-term" data-def="Open Payment Framework — SAP Commerce Cloud's payment interface. Handles authorization in the webshop. An integration between OPF and DPA is being built for token handoff to Cloud ERP. Separate certification required.">OPF</span> — Commerce Cloud's payment framework</p>
  <p><span class="tooltip-term" data-def="SAP Business Technology Platform — the cloud platform hosting DPA and other SAP cloud services. DPA runs on BTP and connects to PSP adapters via standardized REST APIs.">BTP</span> — SAP's cloud platform (hosts DPA)</p>
  <p><span class="tooltip-term" data-def="The SAP module for recurring and usage-based billing. Aggregates millions of subscription charges into manageable line items before posting to the ERP. Connects to DPA for card processing — same cert, no extra certification.">Subscription Billing</span> — Recurring billing module</p>
  <p><span class="tooltip-term" data-def="The complete business process from order through invoicing, payment collection, and reconciliation. DPA automates the payment capture and reconciliation stages. BlueSnap's AR automation extends this further.">Order-to-Cash (O2C)</span> — Full sales cycle in SAP</p>
  <p><span class="tooltip-term" data-def="Bank Communication Management — SAP's tool for outgoing payment file transmission to banks (SEPA, ACH, wire). Part of AP/Treasury workflows. Not related to DPA. Finance stakeholders may bring this up.">BCM</span> — Bank Communication Management</p>
  <p><span class="tooltip-term" data-def="The legacy Cross-Application Payment Card Interface in ECC and on-prem S/4HANA. Allowed direct PSP ABAP integrations. Being replaced by DPA in cloud environments. Still in use during migration periods.">CA-PCI</span> — Legacy card interface (ECC)</p>
</div>

<div class="insight">
  <div class="insight-label">Why This Matters for Sales</div>
  <p>When a prospect says "we're on SAP," your first question should be: <strong>which SAP?</strong> Cloud ERP = DPA is the standard (strong sell). Private Cloud = PCI + clean core argument (strong sell). On-prem = migration narrative. ECC = they must migrate by 2030. And always ask: "are we talking about incoming card payments or outgoing vendor payments?" — this tells you if you're in DPA territory or BCM territory.</p>
</div>

<!-- ═══════════ 3. DPA DEEP DIVE ═══════════ -->
<div class="section" id="sec-dpa-deep">
<h1>Deep Dive: SAP DPA</h1>
<p class="subtitle">Payment flow, tokenization architecture, PCI scope mechanics, and the with/without comparison.</p>

<h2>The Payment Flow — Step by Step</h2>
<p>Click each step to expand the detail.</p>

<div class="flow-steps" id="dpaFlow">
  <div class="flow-step" onclick="toggleStep(this)">
    <span class="step-num">1</span>
    <div><strong>Card Registration / Authorization</strong>
      <div class="step-detail">Customer enters card data via PSP-hosted payment page (never touches SAP). The PSP returns a token. In Commerce Cloud scenarios, this happens via OPF. In external checkout scenarios, this happens directly with the PSP outside SAP.</div>
    </div>
  </div>
  <div class="flow-step" onclick="toggleStep(this)">
    <span class="step-num">2</span>
    <div><strong>Token Translation (Preparation)</strong>
      <div class="step-detail">DPA receives the PSP token and translates it into a <strong>DP Token</strong> — a DPA-specific token. Only the DP Token is stored in S/4HANA documents. This is the key PCI mechanism: in standard hosted-payment-page flows, raw card data never enters the ERP, minimizing PCI scope to SAQ A levels. <em>Note: actual PCI scope depends on the end-to-end architecture, especially how card capture is implemented.</em></div>
    </div>
  </div>
  <div class="flow-step" onclick="toggleStep(this)">
    <span class="step-num">3</span>
    <div><strong>Sales Order / Billing</strong>
      <div class="step-detail">The DP Token is attached to the sales order in Cloud ERP. When billing occurs, DPA uses the token to trigger capture through the PSP (BlueSnap). Re-authorization can occur if the original auth has expired.</div>
    </div>
  </div>
  <div class="flow-step" onclick="toggleStep(this)">
    <span class="step-num">4</span>
    <div><strong>Settlement / Capture</strong>
      <div class="step-detail">DPA sends a capture request to BlueSnap. BlueSnap processes the charge against the card network. Settlement confirmation flows back through DPA into the ERP's financial documents.</div>
    </div>
  </div>
  <div class="flow-step" onclick="toggleStep(this)">
    <span class="step-num">5</span>
    <div><strong>Reconciliation (The ROI Story)</strong>
      <div class="step-detail">DPA fetches settlement advice from the PSP and matches it against open receivables in FICO, then clears the corresponding bank statement entries. <strong>This is often DPA's biggest value-add</strong> — many large SAP customers still do this manually with dedicated teams. This is the ROI argument that justifies DPA's license cost.</div>
    </div>
  </div>
</div>

<h2>With DPA vs. Without DPA</h2>
<div class="toggle-group">
  <button class="toggle-btn active" onclick="togglePanel('dpa-compare', 0, this)">Without DPA</button>
  <button class="toggle-btn" onclick="togglePanel('dpa-compare', 1, this)">With DPA</button>
</div>

<div id="dpa-compare-0" class="toggle-panel active">
  <div class="card" style="border-left: 3px solid var(--red);">
    <div class="card-title" style="color: var(--red);">Without DPA — Legacy / Custom Approach</div>
    <div class="card-body" style="margin-top: 8px;">
      <p>• Custom ABAP code to connect PSP → violates Clean Core, breaks on upgrades</p>
      <p>• Raw card data may flow through S/4HANA → increases PCI scope significantly</p>
      <p>• Reconciliation is often manual: export bank statements, match in spreadsheets, post back to SAP</p>
      <p>• Each PSP integration is unique — no standardization, high maintenance burden</p>
      <p>• For Private Cloud: SAP cannot provide PCI attestation for card flows without DPA</p>
      <p>• For Cloud ERP (Public): not a supported approach for native processing</p>
      <p style="margin-top: 12px;"><span class="badge badge-red">Risk</span> SAP's internal guidance actively positions this as unsupported going forward.</p>
    </div>
  </div>
</div>
<div id="dpa-compare-1" class="toggle-panel">
  <div class="card" style="border-left: 3px solid var(--green);">
    <div class="card-title" style="color: var(--green);">With DPA — The SAP Standard</div>
    <div class="card-body" style="margin-top: 8px;">
      <p>• Certified PSP adapter (BlueSnap) — no custom code, Clean Core compliant</p>
      <p>• Double tokenization (PSP token → DP Token) minimizes PCI scope — in standard hosted-page flows, SAP documents only contain the DP Token</p>
      <p>• Automated end-to-end reconciliation: settlement advice flows into FICO</p>
      <p>• Standardized REST API: one adapter serves sales orders, billing, subscription billing, contract accounting</p>
      <p>• SAP provides PCI attestation for the DPA layer itself</p>
      <p style="margin-top: 12px;"><span class="badge badge-green">Value</span> Licensed on a flat-fee model (pricing is quote-based and trending toward bundling in Cloud ERP subscriptions) — easily justified by reconciliation automation alone.</p>
    </div>
  </div>
</div>

<div class="reality-box">
  <div class="rb-header">
    <div class="rb-col"><div class="rb-label sap">SAP Messaging</div><div class="rb-text">"DPA is mandatory for card processing in Cloud ERP." SAP sales teams are instructed to position DPA as the default for Private Cloud as well.</div></div>
    <div class="rb-col"><div class="rb-label real">What You'll See in the Field</div><div class="rb-text">External checkouts with direct PSP connections still exist — they use DPA's Preparation step to bring tokens into the ERP for reconciliation. Some Private Cloud customers still run legacy CA-PCI interfaces during phased migrations. Hybrid setups are common in 2026. Don't challenge these customers; acknowledge the current state and guide them toward the standard path.</div></div>
  </div>
</div>

<h2>The Token Architecture</h2>
<div class="card">
  <div class="card-body">
    <p>Understanding the three-layer token model is critical for technical conversations:</p>
    <div style="display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap;">
      <div style="flex:1; min-width: 170px; padding: 14px; background: var(--surface2); border-radius: 6px; text-align: center;">
        <div style="font-size: 11px; font-weight: 700; color: var(--green); letter-spacing: 1px; margin-bottom: 6px;">PSP LAYER</div>
        <div style="font-size: 13px;">BlueSnap Token</div>
        <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px; font-family: monospace;">asv32hhgg3223...</div>
      </div>
      <div style="display: flex; align-items: center; color: var(--accent);">→</div>
      <div style="flex:1; min-width: 170px; padding: 14px; background: var(--surface2); border-radius: 6px; text-align: center; border: 1px solid var(--accent);">
        <div style="font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 1px; margin-bottom: 6px;">DPA LAYER</div>
        <div style="font-size: 13px;">DP Token</div>
        <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px; font-family: monospace;">RVWBRS3NCEY...</div>
      </div>
      <div style="display: flex; align-items: center; color: var(--accent);">→</div>
      <div style="flex:1; min-width: 170px; padding: 14px; background: var(--surface2); border-radius: 6px; text-align: center;">
        <div style="font-size: 11px; font-weight: 700; color: var(--orange); letter-spacing: 1px; margin-bottom: 6px;">ERP LAYER</div>
        <div style="font-size: 13px;">Only DP Token + Masked PAN</div>
        <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">**** **** **** 1111</div>
      </div>
    </div>
    <p style="margin-top: 16px; font-size: 12.5px; color: var(--text-dim);">In standard DPA scenarios, S/4HANA only stores the DP Token while card data remains with the PSP. This is why DPA minimizes PCI scope — the ERP never handles actual card data or even the PSP's token. <em>Note: scope reduction depends on how card capture is implemented (hosted page vs. custom UI).</em></p>
  </div>
</div>

<h3>Quick Knowledge Check</h3>
<div class="card" id="quiz-dpa-1">
  <div class="quiz-q">A prospect on S/4HANA Private Cloud says their IT team can handle PCI compliance without DPA. How do you respond?</div>
  <button class="quiz-option" onclick="answerQuiz('quiz-dpa-1', this, false)">"That's fine — on private cloud you have full flexibility to handle it however you want."</button>
  <button class="quiz-option" onclick="answerQuiz('quiz-dpa-1', this, true)">"Your team can technically implement custom code since it's the same code line as on-prem. But S/4HANA isn't designed to handle raw card data, and SAP cannot provide PCI attestation for card flows without DPA. If your PCI assessor asks for that attestation, DPA is the path. SAP strongly recommends it for Private Cloud."</button>
  <button class="quiz-option" onclick="answerQuiz('quiz-dpa-1', this, false)">"DPA is mandatory for all SAP cloud environments — there are no exceptions."</button>
  <div class="quiz-feedback good" id="quiz-dpa-1-good">Correct. This is the nuanced, architect-proof answer. You acknowledged their technical flexibility (same code line), stated the real constraint (SAP won't provide PCI attestation), and framed DPA as SAP's strong recommendation — not an absolute mandate. This language survives scrutiny from both SAP architects and PCI assessors.</div>
  <div class="quiz-feedback bad" id="quiz-dpa-1-bad">Not quite. The first option understates the risk — Private Cloud has real PCI constraints. The third overstates the mandate — Private Cloud isn't Cloud ERP; it's technically the same code line as on-prem. The correct framing: SAP cannot provide PCI attestation without DPA, and SAP strongly recommends it. Position the risk, not the rule.</div>
</div>

function showNode(key) {
  const d = nodeData[key], el = document.getElementById('nodeInfo');
  el.style.display = 'block';
  document.getElementById('nodeInfoContent').innerHTML = '<div class="card-title">' + d.title + '</div><div class="card-body" style="margin-top:8px;">' + d.body + '</div>';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ─── FLOW / TOGGLE / REVEAL / QUIZ / DT / CHECKLIST ───
function toggleStep(el) { const w = el.classList.contains('active'); el.parentElement.querySelectorAll('.flow-step').forEach(s => s.classList.remove('active')); if (!w) el.classList.add('active'); }
function togglePanel(prefix, idx, btn) { btn.parentElement.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('[id^="'+prefix+'-"]').forEach(p => p.classList.remove('active')); document.getElementById(prefix+'-'+idx).classList.add('active'); }
function toggleReveal(btn) { const c = btn.nextElementSibling, o = c.classList.contains('show'); c.classList.toggle('show'); btn.textContent = (o ? '▸ ' : '▾ ') + btn.textContent.substring(2); }
function answerQuiz(qid, btn, correct) { const c = document.getElementById(qid); c.querySelectorAll('.quiz-option').forEach(o => o.classList.add('disabled')); btn.classList.add(correct?'correct':'wrong'); document.getElementById(qid + (correct?'-good':'-bad')).classList.add('show'); }
function dtSelect(btn, key) { document.querySelectorAll('.dt-opt').forEach(o => o.classList.remove('selected')); btn.classList.add('selected'); document.querySelectorAll('.dt-result').forEach(r => { r.classList.remove('show'); r.style.display='none'; }); const r = document.getElementById('dt-'+key); r.style.display='block'; setTimeout(() => r.classList.add('show'), 10); }
function toggleCheck(el) { el.classList.toggle('checked'); }

let simState = {};
function startSim(p) { document.querySelectorAll('.sim-persona-btn').forEach(b => b.classList.remove('selected')); event.currentTarget.classList.add('selected'); simState = { persona: p, scenarioIdx: 0 }; renderSimScenario(); }
function renderSimScenario() {
  const d = simData[simState.persona], s = d.scenarios[simState.scenarioIdx], a = document.getElementById('simArea');
  a.style.display = 'block';
  let h = '<div style="font-size:12px;color:var(--text-dim);margin-bottom:12px">Scenario '+(simState.scenarioIdx+1)+' of '+d.scenarios.length+' — '+d.persona+'</div>';
  h += '<div class="sim-bubble buyer" style="background:var(--surface2);border:1px solid var(--border);max-width:85%;padding:14px 18px;border-radius:12px;margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:var(--orange);margin-bottom:4px">'+d.persona+'</div>'+s.buyer+'</div>';
  h += '<div style="font-size:12px;color:var(--text-dim);margin:8px 0">Choose your response:</div><div style="display:flex;flex-direction:column;gap:8px">';
  s.options.forEach((o,i) => { h += '<button class="quiz-option" onclick="simAnswer('+i+')" id="sim-opt-'+i+'">'+o.text+'</button>'; });
  h += '</div><div class="quiz-feedback" id="sim-feedback"></div><div id="sim-next" style="display:none;margin-top:12px"></div>';
  a.innerHTML = h;
}
function simAnswer(idx) {
  const d = simData[simState.persona], s = d.scenarios[simState.scenarioIdx], o = s.options[idx];
  document.querySelectorAll('#simArea .quiz-option').forEach(b => b.classList.add('disabled'));
  document.getElementById('sim-opt-'+idx).classList.add(o.correct?'correct':'wrong');
  const fb = document.getElementById('sim-feedback');
  fb.className = 'quiz-feedback show '+(o.correct?'good':'bad');
  fb.innerHTML = '<strong>'+(o.correct?'✓ Strong response.':'✗ Not the strongest choice.')+'</strong><br>'+o.feedback;
  const n = document.getElementById('sim-next');
  if (simState.scenarioIdx < d.scenarios.length - 1) { n.style.display='block'; n.innerHTML='<button class="reveal-btn" onclick="simState.scenarioIdx++;renderSimScenario();">Next Scenario →</button>'; }
  else { n.style.display='block'; n.innerHTML='<div style="padding:12px;background:var(--surface2);border-radius:6px;font-size:13px;color:var(--text-dim)">✓ All scenarios complete. Try another persona or continue to the next section.</div>'; }
}
